<svg width="1280" height="880" viewBox="0 0 1280 880" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FAFCFF"/>
      <stop offset="1" stop-color="#F1F6FF"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="880" rx="32" fill="url(#bg)"/>
  <text x="74" y="102" fill="#153765" font-size="38" font-weight="700" font-family="Arial, Helvetica, sans-serif">Practical domain shifts covered by RF-Carer</text>
  <text x="74" y="142" fill="#61708A" font-size="22" font-family="Arial, Helvetica, sans-serif">The system is evaluated under user, motion, layout, obstacle, and environment changes that usually break RF respiration models.</text>

  <g>
    <rect x="74" y="194" width="356" height="248" rx="24" fill="#FFFFFF" stroke="#D7E2F2"/>
    <text x="108" y="244" fill="#1E478C" font-size="27" font-weight="700" font-family="Arial, Helvetica, sans-serif">Free body movements</text>
    <text x="108" y="298" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• walking near the bed</text>
    <text x="108" y="332" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• speaking during monitoring</text>
    <text x="108" y="366" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• turning over or leaning</text>
    <text x="108" y="400" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• arbitrary posture transitions</text>
  </g>

  <g>
    <rect x="462" y="194" width="356" height="248" rx="24" fill="#FFFFFF" stroke="#D7E2F2"/>
    <text x="496" y="244" fill="#1E478C" font-size="27" font-weight="700" font-family="Arial, Helvetica, sans-serif">User and sensing geometry</text>
    <text x="496" y="298" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• unseen users</text>
    <text x="496" y="332" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• different body orientations</text>
    <text x="496" y="366" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• new distances and positions</text>
    <text x="496" y="400" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• changed antenna-view angles</text>
  </g>

  <g>
    <rect x="850" y="194" width="356" height="248" rx="24" fill="#FFFFFF" stroke="#D7E2F2"/>
    <text x="884" y="244" fill="#1E478C" font-size="27" font-weight="700" font-family="Arial, Helvetica, sans-serif">Occlusions and interference</text>
    <text x="884" y="298" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• blankets and soft obstacles</text>
    <text x="884" y="332" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• dynamic nearby motions</text>
    <text x="884" y="366" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• random reflections in space</text>
    <text x="884" y="400" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• cluttered bedroom layouts</text>
  </g>

  <g>
    <rect x="74" y="484" width="550" height="248" rx="24" fill="#FFFFFF" stroke="#D7E2F2"/>
    <text x="108" y="534" fill="#1E478C" font-size="27" font-weight="700" font-family="Arial, Helvetica, sans-serif">Untrained real deployments</text>
    <text x="108" y="588" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• hospitals and care scenarios</text>
    <text x="108" y="622" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• daily home monitoring spaces</text>
    <text x="108" y="656" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• no extra recollection or retraining</text>
    <text x="108" y="690" fill="#54657F" font-size="21" font-family="Arial, Helvetica, sans-serif">• directly reuse a single trained model</text>
  </g>

  <g>
    <rect x="656" y="484" width="550" height="248" rx="24" fill="#275EFE"/>
    <text x="690" y="546" fill="#FFFFFF" font-size="29" font-weight="700" font-family="Arial, Helvetica, sans-serif">Why this matters</text>
    <text x="690" y="600" fill="#EAF1FF" font-size="21" font-family="Arial, Helvetica, sans-serif">Traditional RF respiration systems often work only in</text>
    <text x="690" y="634" fill="#EAF1FF" font-size="21" font-family="Arial, Helvetica, sans-serif">carefully controlled domains. RF-Carer targets the much</text>
    <text x="690" y="668" fill="#EAF1FF" font-size="21" font-family="Arial, Helvetica, sans-serif">harder setting where movement, layout, users, and</text>
    <text x="690" y="702" fill="#EAF1FF" font-size="21" font-family="Arial, Helvetica, sans-serif">environments all change at deployment time.</text>
  </g>
</svg>
